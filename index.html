<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CHIP-8 Emulator</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #0f1117;
    --panel: #171a24;
    --border: #2a2e3d;
    --text: #e6e8ef;
    --dim: #8a8fa3;
    --accent: #5fd3a3;
    --pixel-on: #5fd3a3;
    --pixel-off: #12141c;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-monospace, "SF Mono", Consolas, "Courier New", monospace;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
  }
  h1 { font-size: 18px; margin: 0 0 4px; }
  .subtitle { color: var(--dim); font-size: 13px; margin-bottom: 20px; }
  .layout {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 20px;
    align-items: start;
  }
  canvas {
    background: var(--pixel-off);
    border: 1px solid var(--border);
    border-radius: 4px;
    image-rendering: pixelated;
    display: block;
  }
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 14px 16px;
    margin-bottom: 14px;
  }
  .panel h2 {
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--dim);
    margin: 0 0 10px;
  }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  button, input[type="file"]::file-selector-button {
    background: #232636;
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 6px 12px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); color: #0a1410; border-color: var(--accent); font-weight: 600; }
  label.field { display: flex; flex-direction: column; gap: 4px; font-size: 12px; color: var(--dim); }
  input[type="range"] { width: 160px; }
  .status-row { display: flex; gap: 16px; font-size: 12px; color: var(--dim); flex-wrap: wrap; }
  .status-row span b { color: var(--text); }
  .keypad { display: grid; grid-template-columns: repeat(4, 36px); gap: 6px; }
  .keypad button { padding: 8px 0; text-align: center; }
  .keypad button.active { background: var(--accent); color: #0a1410; }
  pre#disasm {
    max-height: 320px;
    overflow-y: auto;
    font-size: 11px;
    line-height: 1.5;
    margin: 0;
    white-space: pre;
  }
  pre#disasm .current { background: #2a3f36; color: var(--accent); display: inline-block; width: 100%; }
  .hint { color: var(--dim); font-size: 11px; margin-top: 8px; }
</style>
</head>
<body>
  <h1>CHIP-8 Emulator</h1>
  <div class="subtitle">A from-scratch CHIP-8 interpreter, disassembler, and debugger running entirely in the browser.</div>

  <div class="layout">
    <div>
      <canvas id="screen" width="640" height="320"></canvas>

      <div class="panel" style="margin-top: 14px;">
        <h2>Keypad</h2>
        <div class="keypad" id="keypad"></div>
        <div class="hint">Mapped to 1234 / QWER / ASDF / ZXCV on your keyboard.</div>
      </div>
    </div>

    <div>
      <div class="panel">
        <h2>ROM</h2>
        <div class="controls">
          <input type="file" id="romFile" accept=".ch8,.rom,*" />
          <button id="loadDemo">Load demo ROM</button>
        </div>
        <div class="controls">
          <button id="runPause" class="primary">Pause</button>
          <button id="step">Step</button>
          <button id="reset">Reset</button>
        </div>
        <label class="field">
          Speed: <span id="speedLabel">700</span> instructions/sec
          <input type="range" id="speed" min="60" max="2000" step="20" value="700" />
        </label>
      </div>

      <div class="panel">
        <h2>CPU status</h2>
        <div class="status-row">
          <span>PC: <b id="statPc">0x200</b></span>
          <span>I: <b id="statI">0x000</b></span>
          <span>SP: <b id="statSp">0</b></span>
          <span>DT: <b id="statDt">0</b></span>
          <span>ST: <b id="statSt">0</b></span>
        </div>
      </div>

      <div class="panel">
        <h2>Disassembly (around PC)</h2>
        <pre id="disasm">Load a ROM to see disassembly.</pre>
      </div>
    </div>
  </div>

  <script type="module">
    import { Chip8, SCREEN_WIDTH, SCREEN_HEIGHT } from "./src/chip8.js";
    import { disassemble } from "./src/disassembler.js";
    import { buildDemoRom } from "./src/demo-rom.js";

    const canvas = document.getElementById("screen");
    const ctx = canvas.getContext("2d");
    const scale = canvas.width / SCREEN_WIDTH;

    // Simple square-wave beep via Web Audio, started/stopped by the CPU's
    // sound timer edges rather than polled every frame.
    let audioCtx = null;
    let oscillator = null;
    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    function beepStart() {
      ensureAudio();
      if (oscillator) return;
      oscillator = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      gain.gain.value = 0.05;
      oscillator.type = "square";
      oscillator.frequency.value = 440;
      oscillator.connect(gain).connect(audioCtx.destination);
      oscillator.start();
    }
    function beepStop() {
      if (!oscillator) return;
      oscillator.stop();
      oscillator.disconnect();
      oscillator = null;
    }

    const cpu = new Chip8({ onBeepStart: beepStart, onBeepStop: beepStop });
    let romBytes = null;
    let running = false;
    let instructionsPerSecond = 700;
    let acc = 0;
    let lastTime = performance.now();
    let timerAcc = 0;

    const KEYMAP = {
      Digit1: 0x1, Digit2: 0x2, Digit3: 0x3, Digit4: 0xc,
      KeyQ: 0x4, KeyW: 0x5, KeyE: 0x6, KeyR: 0xd,
      KeyA: 0x7, KeyS: 0x8, KeyD: 0x9, KeyF: 0xe,
      KeyZ: 0xa, KeyX: 0x0, KeyC: 0xb, KeyV: 0xf,
    };
    const KEYPAD_LAYOUT = [0x1, 0x2, 0x3, 0xc, 0x4, 0x5, 0x6, 0xd, 0x7, 0x8, 0x9, 0xe, 0xa, 0x0, 0xb, 0xf];

    const keypadEl = document.getElementById("keypad");
    const keyButtons = {};
    for (const key of KEYPAD_LAYOUT) {
      const btn = document.createElement("button");
      btn.textContent = key.toString(16).toUpperCase();
      btn.addEventListener("mousedown", () => setKey(key, true));
      btn.addEventListener("mouseup", () => setKey(key, false));
      btn.addEventListener("mouseleave", () => setKey(key, false));
      keypadEl.appendChild(btn);
      keyButtons[key] = btn;
    }
    function setKey(key, down) {
      cpu.setKey(key, down);
      keyButtons[key]?.classList.toggle("active", down);
    }
    window.addEventListener("keydown", (e) => {
      if (e.code in KEYMAP) setKey(KEYMAP[e.code], true);
    });
    window.addEventListener("keyup", (e) => {
      if (e.code in KEYMAP) setKey(KEYMAP[e.code], false);
    });

    function drawScreen() {
      ctx.fillStyle = "#12141c";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#5fd3a3";
      for (let y = 0; y < SCREEN_HEIGHT; y++) {
        for (let x = 0; x < SCREEN_WIDTH; x++) {
          if (cpu.display[y * SCREEN_WIDTH + x]) {
            ctx.fillRect(x * scale, y * scale, scale, scale);
          }
        }
      }
      cpu.drawFlag = false;
    }

    function hex(n, w) { return "0x" + n.toString(16).toUpperCase().padStart(w, "0"); }

    function updateStatus() {
      document.getElementById("statPc").textContent = hex(cpu.pc, 3);
      document.getElementById("statI").textContent = hex(cpu.I, 3);
      document.getElementById("statSp").textContent = cpu.sp;
      document.getElementById("statDt").textContent = cpu.delayTimer;
      document.getElementById("statSt").textContent = cpu.soundTimer;
    }

    let disasmLines = [];
    function updateDisasm() {
      if (!romBytes) return;
      const pre = document.getElementById("disasm");
      const windowSize = 12;
      const startIdx = Math.max(0, Math.floor((cpu.pc - 0x200) / 2) - windowSize / 2);
      const slice = disasmLines.slice(startIdx, startIdx + windowSize);
      pre.innerHTML = slice
        .map((l) => {
          const isCurrent = l.address === cpu.pc;
          const line = l.text;
          return isCurrent ? `<span class="current">${line}</span>` : line;
        })
        .join("\n");
    }

    function loadRom(bytes) {
      romBytes = bytes;
      cpu.loadROM(bytes);
      disasmLines = disassemble(bytes);
      drawScreen();
      updateStatus();
      updateDisasm();
    }

    document.getElementById("loadDemo").addEventListener("click", () => {
      loadRom(buildDemoRom());
    });

    document.getElementById("romFile").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const buf = await file.arrayBuffer();
      loadRom(new Uint8Array(buf));
    });

    document.getElementById("reset").addEventListener("click", () => {
      if (romBytes) loadRom(romBytes);
    });

    document.getElementById("step").addEventListener("click", () => {
      cpu.step();
      drawScreen();
      updateStatus();
      updateDisasm();
    });

    const runPauseBtn = document.getElementById("runPause");
    runPauseBtn.addEventListener("click", () => {
      running = !running;
      runPauseBtn.textContent = running ? "Pause" : "Run";
      lastTime = performance.now();
    });

    const speedInput = document.getElementById("speed");
    speedInput.addEventListener("input", () => {
      instructionsPerSecond = Number(speedInput.value);
      document.getElementById("speedLabel").textContent = instructionsPerSecond;
    });

    function frame(now) {
      const dt = (now - lastTime) / 1000;
      lastTime = now;

      if (running && romBytes) {
        acc += dt * instructionsPerSecond;
        timerAcc += dt * 60;

        while (timerAcc >= 1) {
          cpu.tickTimers();
          timerAcc -= 1;
        }

        let steps = Math.floor(acc);
        acc -= steps;
        // Guard against a stalled tab dumping thousands of queued instructions at once.
        steps = Math.min(steps, instructionsPerSecond);
        for (let i = 0; i < steps; i++) cpu.step();

        if (cpu.drawFlag) drawScreen();
        updateStatus();
        updateDisasm();
      }

      requestAnimationFrame(frame);
    }

    drawScreen();
    requestAnimationFrame(frame);
  </script>
</body>
</html>
